<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vehicle Tracker Sidebar + Map</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    html,
    body {
      height: 100%;
      background: #f2f5f8;
      font-family: 'Poppins', sans-serif;
    }

    .card {
      border: none;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    .left-panel {
      height: calc(100vh - 32px);
      overflow: auto;
      padding-bottom: 20px;
    }

    .search-wrapper {
      position: relative;
      flex-grow: 1;
    }

    .search-wrapper input {
      border-radius: 30px;
      padding-left: 42px;
      font-size: 14px;
    }

    .search-wrapper i {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      color: #6c757d;
      font-size: 1.1rem;
    }

    .filter-btn {
      background: #eef1f4;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: .3s;
    }

    .filter-btn:hover {
      background: #007bff;
      color: #fff;
    }

    .accordion-button {
      border-radius: 12px !important;
      background: #f9fafc !important;
      color: #333;
      font-weight: 500;
      font-size: 15px;
      box-shadow: none;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 0.6em 1em;
    }

    .accordion-button i {
      color: #007bff;
      margin-right: 10px;
      font-size: 1.3rem;
    }

    .accordion-button:not(.collapsed) {
      background-color: #e9f2ff !important;
      color: #0d6efd;
    }

    .accordion-body {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
    }

    .vehicle-card {
      background: #f9fafb;
      border-radius: 12px;
      padding: 8px;
      border: 1px solid #e4e7ec;
      margin-bottom: 8px;
      transition: background 0.2s;
    }

    .vehicle-card:hover {
      background: #f1f4f8;
    }

    .vehicle-item {
      font-size: 0.85rem;
      color: #555;
    }

    .vehicle-item i {
      color: #007bff;
      margin-right: 6px;
    }

    .no-results {
      text-align: center;
      color: #999;
      padding: 20px 0;
    }

    .map-column {
      padding-left: 8px;
      padding-right: 0;
    }

    #map {
      width: 100%;
      height: calc(100vh - 32px);
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    @media (max-width:991px) {
      .map-column {
        padding-left: 0;
        margin-top: 16px;
      }

      .left-panel {
        height: auto;
      }

      #map {
        height: 60vh;
      }
    }
  </style>
</head>

<body>
  <div class="container-fluid mt-3">
    <div class="row gx-3">

      <!-- Sidebar -->
      <div class="col-lg-3">
        <div class="card p-3 left-panel">

          <!-- Search -->
          <div class="d-flex align-items-center mb-3">
            <div class="search-wrapper w-100">
              <i class="bi bi-search"></i>
              <input type="text" id="vehicleSearch" class="form-control" placeholder="Search vehicles...">
            </div>
            <!-- <button class="filter-btn ms-2" title="Filter"><i class="bi bi-sliders"></i></button> -->
          </div>

          <!-- Accordion -->
          <div class="accordion" id="vehicleAccordion">

            <!-- John Doe -->
            
          </div> <!-- end accordion -->

          <div class="no-results d-none">No results found</div>
        </div>
      </div>

      <!-- Map -->
      <div class="col-lg-9 map-column">
        <div id="map"></div>
      </div>

    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBNyJWb04pByaU1CTmimoWNl3b86VV6qZ8&callback=initAutocomplete&libraries=places&v=weekly"
    defer></script>

  <script>
    let map;
    const vehicleMarkers = {};

    // ✅ Initialize Google Map
    function initAutocomplete() {
      const style = [
        { elementType: "geometry", stylers: [{ color: "#F3F3F3" }] },
        { featureType: "water", elementType: "geometry", stylers: [{ color: "#CAD4DC" }] }
      ];
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 30.3753, lng: 69.3451 },
        zoom: 6,
        styles: style
      });
      renderAccordion(1)

      // ✅ Once map loads, fetch vehicle data
      // fetchVehicles();
    }
    window.initAutocomplete = initAutocomplete;

    // // ✅ Fetch API data
    // async function fetchVehicles() {
    //   try {
    //     const res = await fetch('http://151.106.17.246:8080/byco/app_apis/all_vehicles.php?accesskey=12345'); // <-- replace with your API endpoint
    //     const data = await res.json();

    //     if (!Array.isArray(data)) return;
    //     renderAccordion(data);
    //   } catch (err) {
    //     console.error("Error fetching vehicles:", err);
    //   }
    // }

    // ✅ Group vehicles by tracker
    function groupByTracker(vehicles) {
      const grouped = {};
      vehicles.forEach(v => {
        const tracker = v.tracker || 'Unknown';
        if (!grouped[tracker]) grouped[tracker] = [];
        grouped[tracker].push(v);
      });
      return grouped;
    }

    // ✅ Render dynamic accordion
    function renderAccordion(vehicles) {
      vehicles=[{"id":"17319","name":"JQ-1937","uniqueId":null,"latestPosition_id":null,"device_type":"0","trackername":"ips","organisation":null,"tracker":"ips","speed":"0","speedlimit":"60","lat":"30.499370555556","lng":"73.055730555556","location":"","time":"2025-10-22 18:01:36","angle":"0","imei":"ipsJQ1937","odometer":"0","ignition":"OFF","lasttime":"2025-10-22 17:32:15","activedate":"2025-10-21 20:50:33","is_on_trip":"0","trip_type":"0","last_trip_time":"0"},{"id":"17320","name":"SLN-551","uniqueId":null,"latestPosition_id":null,"device_type":"0","trackername":"ips","organisation":null,"tracker":"ips","speed":"10","speedlimit":"60","lat":"30.647381666667","lng":"73.130346666667","location":"","time":"2025-10-22 18:00:02","angle":"0","imei":"ipsSLN551","odometer":"0","ignition":"ON","lasttime":"2025-10-22 17:32:15","activedate":"2025-10-21 20:50:33","is_on_trip":"0","trip_type":"0","last_trip_time":"0"},{"id":"17282","name":"TMK-350","uniqueId":null,"latestPosition_id":null,"device_type":"0","trackername":"livetrack","organisation":null,"tracker":"livetrack","speed":"29","speedlimit":"60","lat":"34.071797","lng":"73.177065","location":"Havelian, Havelian Tehsil, Abbottabad District, Hazara Division, Khyber Pakhtunkhwa, Pakistan","time":"2025-10-22 17:41:08","angle":"323","imei":"liveTMK350","odometer":"6181.86","ignition":"ON","lasttime":"2025-10-22 17:42:09","activedate":"2025-10-05 10:50:00","is_on_trip":"0","trip_type":"0","last_trip_time":"0"}]
      const grouped = groupByTracker(vehicles);
      const container = document.getElementById('vehicleAccordion');
      container.innerHTML = ''; // clear old

      Object.entries(grouped).forEach(([tracker, items], i) => {
        const collapseId = `collapse_${i}`;
        const trackerHTML = `
        <div class="accordion-item" data-driver="${tracker}">
          <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
              data-bs-target="#${collapseId}" aria-expanded="false" aria-controls="${collapseId}">
              <input type="checkbox" class="form-check-input me-2 driver-checkbox" title="Toggle all ${tracker} vehicles">
              <i class="bi bi-router-fill me-2"></i> ${tracker}
            </button>
          </h2>
          <div id="${collapseId}" class="accordion-collapse collapse" data-bs-parent="#vehicleAccordion">
            <div class="accordion-body p-2">
              ${items.map(vehicleCardHTML).join('')}
            </div>
          </div>
        </div>
      `;
        container.insertAdjacentHTML('beforeend', trackerHTML);
      });
    }

    // ✅ Vehicle card template
    function vehicleCardHTML(v) {
      const ignition = v.ignition === 'ON' ? 'On' : 'Off';
      const speed = v.speed || 0;
      const date = v.time ? new Date(v.time).toLocaleDateString() : '';
      const location = v.location || 'Unknown';

      return `
      <div class="vehicle-card" 
        data-vehicle="${v.name}" 
        data-location="${location}" 
        data-lat="${v.lat}" 
        data-lng="${v.lng}">
        <div class="d-flex justify-content-between align-items-center mb-1" style="color: lightslategrey;">
          <div class="fw-semibold text-truncate vehicle-name" style="font-size: 0.8em;">
            <i class="bi bi-truck me-1" style="color:#0d6efd"></i>${v.name}
          </div>
          <input type="checkbox" class="form-check-input vehicle-checkbox" title="Show ${v.name} on map">
        </div>

        <div class="row text-muted small g-0">
     
          <div class="col-5" style="font-size: 0.7em;"><i style="color:#0d6efd"
              class="bi bi-speedometer2 me-1"></i> ${speed} km/h</div>
          <div class="col-3" style="font-size: 0.7em;"><i style="color:#0d6efd"
              class="bi bi-lightning-charge me-1"></i> ${ignition}</div>
          <div class="col-4" style="font-size: 0.7em;"><i style="color:#0d6efd"
              class="bi bi-calendar3 me-1"></i> ${date}</div>
                   <div class="col-12" style="font-size: 0.7em;"><i style="color:#0d6efd"
              class="bi bi-geo-alt me-1"></i> ${location}</div>
        </div>
      </div>
    `;
    }

    // ✅ Marker toggle helpers
    function markerKey(card) {
      const driver = card.closest('.accordion-item')?.getAttribute('data-driver') || '';
      return driver + '|' + (card.dataset.vehicle || '');
    }

    function toggleVehicleMarker(card, checked) {
      if (!card) return;
      const name = card.dataset.vehicle;
      const lat = parseFloat(card.dataset.lat);
      const lng = parseFloat(card.dataset.lng);
      const location = card.dataset.location;
      const key = markerKey(card);

      if (checked) {
        if (!isNaN(lat) && !isNaN(lng)) {
          if (vehicleMarkers[key]) return;
          const marker = new google.maps.Marker({
            position: { lat, lng },
            map,
            title: `${name} — ${location}`
          });
          vehicleMarkers[key] = marker;
        }
      } else {
        if (vehicleMarkers[key]) {
          vehicleMarkers[key].setMap(null);
          delete vehicleMarkers[key];
        }
      }
    }

    // ✅ Checkbox + Search events (same as before)
    document.addEventListener('click', e => {
      if (e.target.classList.contains('driver-checkbox') || e.target.classList.contains('vehicle-checkbox')) {
        e.stopPropagation();
      }
    });

    document.addEventListener('change', function (e) {
      if (e.target.classList.contains('vehicle-checkbox')) {
        const card = e.target.closest('.vehicle-card');
        toggleVehicleMarker(card, e.target.checked);
        const body = e.target.closest('.accordion-body');
        if (body) {
          const driverCheckbox = body.closest('.accordion-item').querySelector('.driver-checkbox');
          const all = [...body.querySelectorAll('.vehicle-checkbox')];
          driverCheckbox.checked = all.length > 0 && all.every(v => v.checked);
        }
      }

      if (e.target.classList.contains('driver-checkbox')) {
        const item = e.target.closest('.accordion-item');
        const boxes = item.querySelectorAll('.vehicle-checkbox');
        boxes.forEach(v => {
          v.checked = e.target.checked;
          toggleVehicleMarker(v.closest('.vehicle-card'), e.target.checked);
        });
      }
    });

    // ✅ Search
    document.getElementById('vehicleSearch').addEventListener('input', function () {
      const q = this.value.trim().toLowerCase();
      const items = document.querySelectorAll('#vehicleAccordion .accordion-item');
      let foundAny = false;

      items.forEach(item => {
        const driver = (item.getAttribute('data-driver') || '').toLowerCase();
        const cards = Array.from(item.querySelectorAll('.vehicle-card'));
        let anyMatch = false;

        cards.forEach(card => {
          const vehicle = (card.dataset.vehicle || '').toLowerCase();
          const loc = (card.dataset.location || '').toLowerCase();
          const match = q === '' || driver.includes(q) || vehicle.includes(q) || loc.includes(q);
          card.classList.toggle('d-none', !match);
          if (match) anyMatch = true;
        });

        const collapse = item.querySelector('.accordion-collapse');
        const button = item.querySelector('.accordion-button');

        if (anyMatch) {
          collapse.classList.add('show');
          button.classList.remove('collapsed');
          foundAny = true;
        } else {
          collapse.classList.remove('show');
          button.classList.add('collapsed');
        }

        item.classList.toggle('d-none', !anyMatch);
      });

      document.querySelector('.no-results').classList.toggle('d-none', foundAny || q === '');
    });
  </script>

</body>

</html>
